<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老年人合理用药干预 · 药师工作台</title>
<style>
:root{
  --blue:#1f6fb2; --blue-d:#15507f; --blue-l:#e8f1f9;
  --green:#2e8b57; --amber:#b45309; --red:#b91c1c;
  --ink:#1f2937; --muted:#6b7280; --line:#d1d5db; --bg:#f3f4f6; --card:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
header{background:var(--blue-d);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:19px;font-weight:700}
header .sub{font-size:12px;opacity:.85}
nav{background:var(--blue);display:flex;flex-wrap:wrap;padding:0 12px}
nav button{background:none;border:none;color:#dbeafe;padding:12px 18px;font-size:15px;cursor:pointer;border-bottom:3px solid transparent}
nav button.active{color:#fff;font-weight:700;border-bottom-color:#fff;background:rgba(255,255,255,.08)}
main{max-width:1080px;margin:18px auto;padding:0 14px 60px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:14px}
.card h2{font-size:17px;color:var(--blue-d);margin-bottom:10px;border-left:4px solid var(--blue);padding-left:8px}
.card h3{font-size:15px;margin:12px 0 6px;color:var(--ink)}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:760px){.g2,.g3,.g4{grid-template-columns:1fr}}
label.f{display:block;font-size:13px;color:var(--muted);margin-bottom:3px}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:15px;font-family:inherit;background:#fff}
textarea{min-height:60px;resize:vertical}
a.btn{text-decoration:none}
.btn{display:inline-block;background:var(--blue);color:#fff;border:none;border-radius:7px;padding:9px 18px;font-size:15px;cursor:pointer;font-family:inherit}
.btn:hover{background:var(--blue-d)}
.btn.sec{background:#fff;color:var(--blue);border:1px solid var(--blue)}
.btn.warn{background:var(--red)}
.btn.sm{padding:5px 12px;font-size:13px;border-radius:6px}
.btn:disabled{background:#9ca3af;cursor:not-allowed;border-color:#9ca3af;color:#eee}
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12.5px;font-weight:700}
.tag.good{background:#d1fae5;color:#065f46}.tag.mid{background:#fef3c7;color:#92400e}.tag.low{background:#fee2e2;color:#991b1b}
.tag.info{background:var(--blue-l);color:var(--blue-d)}
.tag.grey{background:#e5e7eb;color:#374151}
table.t{width:100%;border-collapse:collapse;font-size:14px}
table.t th,table.t td{border:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top}
table.t th{background:#eef2f7}
.qrow{display:flex;align-items:flex-start;gap:10px;padding:9px 6px;border-bottom:1px solid #eef0f3;flex-wrap:wrap}
.qrow:nth-child(odd){background:#fafbfc}
.qrow .qt{flex:1 1 380px;min-width:260px}
.qrow .opts{display:flex;gap:4px;flex-wrap:wrap}
.opts label{display:flex;align-items:center;gap:4px;border:1px solid var(--line);border-radius:6px;padding:5px 9px;cursor:pointer;font-size:13.5px;background:#fff;white-space:nowrap}
.opts label:has(input:checked){background:var(--blue);color:#fff;border-color:var(--blue)}
.opts input{accent-color:#fff}
.qnum{color:var(--muted);font-size:12.5px}
.missing{outline:2px solid var(--red);border-radius:6px}
.script{background:#f6f8fa;border:1px solid var(--line);border-radius:8px;margin:10px 0;overflow:hidden}
.script .sh{background:var(--blue-l);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.script .sh b{color:var(--blue-d);font-size:14.5px}
.script .sb{padding:10px 14px;white-space:pre-wrap;line-height:1.75;font-size:14.5px}
.script .sn{padding:6px 14px 10px;font-size:12.5px;color:var(--amber)}
.stat{display:flex;gap:12px;flex-wrap:wrap}
.stat .s{flex:1 1 140px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;text-align:center}
.stat .s b{display:block;font-size:26px;color:var(--blue-d)}
.stat .s span{font-size:13px;color:var(--muted)}
.bar{height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--blue)}
.bar.weak i{background:var(--red)}
.muted{color:var(--muted);font-size:13px}
.note{background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:10px 12px;font-size:13.5px;margin:8px 0}
.steps{display:flex;gap:0;margin-bottom:14px;flex-wrap:wrap}
.steps div{flex:1;text-align:center;padding:8px 4px;background:#e5e7eb;color:var(--muted);font-size:13.5px;border-right:2px solid #fff;min-width:110px}
.steps div.on{background:var(--blue);color:#fff;font-weight:700}
.steps div.done{background:#bfdbfe;color:var(--blue-d)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spacer{flex:1}
.plist{width:100%;border-collapse:collapse}
.plist td,.plist th{padding:9px 8px;border-bottom:1px solid #e5e7eb;font-size:14px;text-align:left}
.plist tr:hover td{background:var(--blue-l);cursor:pointer}
.chip{display:inline-block;background:#eef2f7;border:1px solid var(--line);border-radius:6px;padding:2px 8px;margin:2px;font-size:13px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 22px;border-radius:8px;font-size:14px;opacity:0;transition:.25s;pointer-events:none;z-index:99}
.toast.show{opacity:.94}
.due-warn{color:var(--amber);font-weight:700}.due-over{color:var(--red);font-weight:700}.due-ok{color:var(--green);font-weight:700}
fieldset{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin:10px 0}
legend{font-size:14px;font-weight:700;color:var(--blue-d);padding:0 6px}
.ck{display:inline-flex;align-items:center;gap:5px;margin:3px 10px 3px 0;font-size:14px;cursor:pointer}
.searchbox{max-width:320px}
.disabledbox{opacity:.55;pointer-events:none}
.script.collapsed .sb,.script.collapsed .sn{display:none}
.sigwrap{border:1px dashed var(--blue);border-radius:8px;background:#fff;overflow:hidden}
canvas.sig{display:block;width:100%;height:180px;touch-action:none;cursor:crosshair}
.thwrap{position:relative;display:inline-block;margin:4px}
.thwrap img{width:96px;height:96px;object-fit:cover;border:1px solid var(--line);border-radius:8px;cursor:zoom-in;display:block}
.thwrap .rm{position:absolute;top:-7px;right:-7px;background:var(--red);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:13px;line-height:1}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:60;cursor:zoom-out}
.lightbox img{max-width:94vw;max-height:94vh;border-radius:6px}
.advrow{display:flex;gap:8px;align-items:flex-start;padding:7px 6px;border-bottom:1px solid #eef0f3;font-size:13.5px;flex-wrap:wrap}
.advrow:nth-child(even){background:#fafbfc}
.advrow .no{color:var(--muted);flex:0 0 30px}
.advrow .tx{flex:1 1 300px;min-width:220px}
.advrow .tip{flex:1 1 320px;min-width:220px;color:#374151}
.qrbox{text-align:center;padding:8px}
.qrbox img{border:1px solid var(--line);border-radius:6px;background:#fff}
#printArea{display:none;position:fixed;inset:0;background:#fff;z-index:70;overflow:auto;padding:34px 8%;line-height:1.9}
#printArea.show{display:block}
@media print{ body>*{display:none!important} #printArea{display:block!important;position:static;padding:0} #printArea .noprint{display:none!important} }
</style>
</head>
<body>
<header>
  <h1>老年人合理用药干预 · 药师工作台</h1>
  <span class="sub">基于药物素养的精准用药教育干预（配套CRF V2.0 / 附件2话术方案）· 离线版 V1.1</span>
  <span class="spacer"></span>
  <span class="sub" id="hdCenter"></span>
</header>
<nav id="nav">
  <button data-v="dash" class="active">工作台</button>
  <button data-v="patients">患者管理</button>
  <button data-v="enroll">新增入组</button>
  <button data-v="scripts">话术库</button>
  <button data-v="data">数据导出</button>
  <button data-v="settings">设置</button>
</nav>
<main id="view"></main>
<div class="toast" id="toast"></div>
<div id="printArea"></div>

{id:"A1",cat:"入组",title:"项目介绍与知情同意（面对面照读）",body:`“您好，叔叔/阿姨！我是咱们【社区卫生服务中心名称】的药师【姓名】。我们正在开展北京市卫健委组织的老年人合理用药指导项目，目的是帮助像您一样长期吃药的老年朋友，把药吃得更明白、更安全。

{id:"A3",cat:"入组",title:"入群邀请（面对面照读）",body:`“为了平时也能帮到您，我们建了患者微信群，群名叫‘老年人合理用药干预患者群’。群里每周药师发一期用药小知识；您平时用药有拿不准的，也可以在群里问，药师看到都会回复。

{id:"B1",cat:"首次干预",title:"良好层（≥4分）首次干预",body:`【开场与结果反馈】“叔叔/阿姨，您的问卷结果很好，说明您平时用药讲究、懂得也多，这个好习惯要保持。今天我帮您把用药再往细里理一理，重点说说怎么把病控制得更稳、预防并发症。”
【教育要点】“您的血压（血糖、血脂）控制目标，要以您主诊医生定的为准。长期把指标控制在目标范围里，最大的好处是预防心梗、脑梗、肾损害这些并发症——药不是白吃的，吃的是‘保险’。咱们把您现在吃的药一样一样过一遍……（结合用药清单逐一讲解；如需调整服药时间或间隔，先与主诊医师确认。）”

【结束语】“您懂得多，群里有人问问题，也欢迎您现身说法。有问题随时在群里@我，第1个月我再联系您。”`,
note:"常用勾选：①②；涉及时间/间隔调整加勾⑤⑥，设置提醒加勾⑦。"},
{id:"B2",cat:"首次干预",title:"中等层（3～4分）首次干预",body:`【开场与结果反馈】“叔叔/阿姨，您的问卷结果属于中等水平，用药的大方向是对的，但有几个容易踩坑的地方，我给您指一指，帮您把最后这几步补齐。”

{id:"B3",cat:"首次干预",title:"不足层（≤3分）首次干预（含家属沟通）",body:`【开场与结果反馈】“叔叔/阿姨，从问卷看，咱们有些用药的基本常识还要一起补一补。不着急，我今天就给您讲最要紧的三件事，您听我慢慢说。”

【结束语】“咱们不贪多，就把这三件事做好。过两个星期我给您打个电话问问情况，第1个月正式随访我再来。”`,

{id:"C1",cat:"微信群",title:"入群欢迎语（新成员入群时发送）",body:`欢迎您加入“老年人合理用药干预患者群”！我们是北京市卫健委老年人合理用药指导项目的药师团队。在这个群里：每周有一期【用药小课堂】；您用药中有不明白的，随时提问，值班药师会尽快回复。请先将群昵称改为“姓名＋社区”，并阅读群公告。祝您健康！`},
{id:"C2",cat:"微信群",title:"群公告与群规（置顶公告）",body:`【群公告】本群为“老年人合理用药干预患者群”，由项目组药师管理，仅用于合理用药科普与咨询。请各位注意：
1. 群内回复仅供参考，不能代替医生的诊断和处方；调整用药请先咨询您的主诊医师。
2. 如出现胸痛不缓解、呼吸困难、一侧肢体无力、口角歪斜、意识不清、服药后全身皮疹伴憋气等紧急情况，请立即拨打120或就近就医，不要在群里等回复。
3. 群内咨询由值班药师在每天【时间段】回复，其余时间的提问次日回复。

5. 请勿发布广告、售药链接、募捐及未经证实的“养生偏方”，违者将被移出群聊。`},
{id:"W1",cat:"群推送",title:"第1周 · 给药途径",body:`【用药小课堂·第1期】能吃药，不打针；能打针，不输液。
不少老人觉得“输液好得快”。其实输液的药直接进血管，一旦过敏或输得太快，风险比吃药大得多，心脏不好的老人还可能加重心衰。世界卫生组织提倡：能口服就不注射。医生判断需要输液的咱们配合，但别自己主动要求输液。
互动：您以前是不是也觉得“输液好得快”？欢迎在群里说说。`},
{id:"W2",cat:"群推送",title:"第2周 · 药品质量认知",body:`【用药小课堂·第2期】贵药不等于好药，对症才是好药。
药不是越贵越好、越有名越好。同样成分、通过国家一致性评价的仿制药，疗效和原研药相当，价格却便宜不少。选药看的是适不适合您的病情，请遵医嘱，不要只认贵的、只认广告里的。
互动：您买药时最看重什么？价格、牌子还是医生建议？`},
{id:"W3",cat:"群推送",title:"第3周 · 药物治疗常识",body:`【用药小课堂·第3期】保健品不是药，牛奶咖啡别送药。
保健品不能治病，更不能代替药；吃了保健品也不能自己把药减量。吃药请用温开水送服，牛奶、咖啡、浓茶、果汁都可能影响药效。另外提醒：疫苗是预防疾病最有效、最省钱的办法，流感疫苗、肺炎疫苗请留意社区接种通知。
互动：您家里有没有“当药吃”的保健品？说出来，药师帮您把把关。`},
{id:"W4",cat:"群推送",title:"第4周 · 自我药疗风险",body:`【用药小课堂·第4期】这五件事，千万别做！
①过期药别吃；②感觉没效果，别自己换药、加量；③病好了，别自己多吃几天“巩固巩固”；④几种药别自己混着搭配吃；⑤吃药后不舒服，别只是自己停药——请先联系药师或医生。
互动：这五件事，您中过几条？下周我们教您看说明书，很多坑就能躲开。`},
{id:"W5",cat:"群推送",title:"第5周 · 看懂说明书",body:`【用药小课堂·第5期】三分钟看懂药品说明书。
拿到新药，重点看四处：①用法用量——一次几片、一天几次、饭前还是饭后；②禁忌——哪些人不能吃；③不良反应——可能有什么不舒服，心里有数不慌张；④注意事项——能不能喝酒、影不影响开车。字太小看不清、看不懂的，拍照发群里，药师帮您看。

{id:"W6",cat:"群推送",title:"第6周 · 抗菌药物",body:`【用药小课堂·第6期】“消炎药”不能随便吃。

{id:"C4-1",cat:"微信群",title:"服药提醒（每周1次，建议周一上午）",body:`【温馨提醒】各位叔叔阿姨早上好！新的一周开始了，提醒三件事：①今天把本周的药分进药盒；②看看哪种药只剩一周的量了，提前去开，别断药；③换季变天，更要按时吃药、按时测血压血糖。祝大家一周健康！`},

{id:"Q1",cat:"群答疑",title:"“我血压（血糖）正常了，能停药吗？”",body:`建议回复：“指标正常，正说明药在起作用，不是病好了。自己停药很容易反弹，反复波动最伤血管，严重的会诱发心梗、脑梗。想减药停药，请带上您的监测记录去找主诊医生评估，医生点头才能调。”`},

/* =====================================================================
   状态与存储
===================================================================== */
const STORE_KEY = "ysgzt_v1";
let state = {settings:{centerNo:"",centerName:"",pharmacist:"",phone:"",pushStart:""},patients:[]};
let storageOK = true;
function load(){
  try{ const raw = localStorage.getItem(STORE_KEY); if(raw) state = JSON.parse(raw); }
  catch(e){ storageOK = false; }
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e){ storageOK = false; toast("警告：本机存储不可用，数据仅保存在内存中，请及时导出备份！"); }
  scheduleCloud();
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 2600);
}
function esc(s){ return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function copyText(txt){
  const done = ()=>toast("已复制到剪贴板");
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt,done));
  } else fallbackCopy(txt,done);
}
function fallbackCopy(txt,done){
  const ta=document.createElement("textarea"); ta.value=txt; document.body.appendChild(ta);
  ta.select(); try{document.execCommand("copy"); done();}catch(e){toast("复制失败，请手动选择文本");}
  document.body.removeChild(ta);
}
function fmtDate(d){ if(!d) return ""; const x=new Date(d); const p=n=>String(n).padStart(2,"0"); return `${x.getFullYear()}-${p(x.getMonth()+1)}-${p(x.getDate())}`; }
function addDays(dateStr,n){ const d=new Date(dateStr); d.setDate(d.getDate()+n); return d; }
function today(){ return fmtDate(new Date()); }

/* =====================================================================
   计分
===================================================================== */
function scoreLit(vals){ // vals: array41 of score values(1-5)
  const total = vals.reduce((a,b)=>a+b,0);
  const avg = total/41;
  const lv = levelOf(avg);
  const dims = {};
  for(const [name,items] of Object.entries(DIMS)){
    const s = items.reduce((a,i)=>a+vals[i-1],0);
    dims[name] = +(s/items.length).toFixed(2);
  }
  return {total, avg:+avg.toFixed(2), level:lv, pass:(total>=157||avg>=3.82), dims};
}
function scoreAmrs(vals){ return vals.reduce((a,b)=>a+b,0); } // 12-48，得分越低依从性越好

/* 随访窗口：入组后第1个月（30±7天）、第3个月（90±7天） */
function fuMonth(which){ return which===1?1:3; }
function fuStatus(p, which){
  const fu = which===1? p.fu1 : p.fu2;
  if(fu && fu.done) return {code:"done",label:"已完成（"+fu.date+"）",cls:"due-ok"};
  const base = which===1? 30 : 90;
  const open = addDays(p.enrollDate, base-7), close = addDays(p.enrollDate, base+7);
  const now = new Date(today());
  if(now < open) return {code:"pending",label:"未到期（窗口 "+fmtDate(open)+" ~ "+fmtDate(close)+"）",cls:"muted"};
  if(now <= close) return {code:"due",label:"窗口期内，应随访（截止 "+fmtDate(close)+"）",cls:"due-warn"};
  return {code:"over",label:"已超窗（"+fmtDate(close)+"），请尽快补访并说明原因",cls:"due-over"};
}

/* ---- 电子签字板 ---- */
function initSigPad(){
  const cv=document.getElementById("sigpad"); if(!cv) return;
  if(!cv.clientWidth){ requestAnimationFrame(initSigPad); return; } // 等待布局完成再初始化
  const dpr=window.devicePixelRatio||1, w=cv.clientWidth, h=180;
  cv.width=w*dpr; cv.height=h*dpr;
  const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.strokeStyle="#111827";
  if(enr && sigValid(enr.consent.sig)){ const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0,w,h); img.src=enr.consent.sig; }
  let drawing=false, moved=false;
  cv.onpointerdown=e=>{ drawing=true; moved=false; try{cv.setPointerCapture(e.pointerId);}catch(x){}
    ctx.beginPath(); ctx.moveTo(e.offsetX,e.offsetY); e.preventDefault(); };
  cv.onpointermove=e=>{ if(!drawing) return; moved=true; ctx.lineTo(e.offsetX,e.offsetY); ctx.stroke(); e.preventDefault(); };
  const end=()=>{ if(!drawing) return; drawing=false;
    if(moved && cv.width>0) enr.consent.sig=cv.toDataURL("image/png"); };
  cv.onpointerup=end; cv.onpointercancel=end; cv.onpointerleave=end;
}
function sigValid(sig){ return typeof sig==="string" && sig.startsWith("data:image/png") && sig.length>500; }
function clearSig(){ if(enr) enr.consent.sig=null; initSigPad(); }

/* ---- 照片：压缩 + IndexedDB（不占用 localStorage 配额） ---- */
const MAX_PHOTOS=5;
function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("ysgzt_db",1);
    r.onupgradeneeded=()=>{ r.result.createObjectStore("photos"); };
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
  });
}
async function photosGet(pid){
  try{ const db=await idbOpen();
    return await new Promise(res=>{ const q=db.transaction("photos").objectStore("photos").get(pid);
      q.onsuccess=()=>res(q.result||[]); q.onerror=()=>res([]); });
  }catch(e){ return []; }
}
async function photosSet(pid,arr){
  try{ const db=await idbOpen();
    await new Promise((res,rej)=>{ const t=db.transaction("photos","readwrite");
      t.objectStore("photos").put(arr,pid); t.oncomplete=res; t.onerror=()=>rej(t.error); });
  }catch(e){ toast("照片保存失败："+e.message); }
}
async function photosDel(pid){
  try{ const db=await idbOpen();
    await new Promise(res=>{ const t=db.transaction("photos","readwrite");
      t.objectStore("photos").delete(pid); t.oncomplete=res; t.onerror=res; });
  }catch(e){}
}
function compressImage(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{ const m=1280; let w=img.width,h=img.height;
      const k=Math.min(1,m/Math.max(w,h)); w=Math.round(w*k); h=Math.round(h*k);
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(img.src); res(c.toDataURL("image/jpeg",0.6)); };
    img.onerror=()=>{ URL.revokeObjectURL(img.src); rej(new Error("图片读取失败")); };
    img.src=URL.createObjectURL(file);
  });
}
function showImg(src){
  const d=document.createElement("div"); d.className="lightbox";
  d.innerHTML=`<img src="${src}">`; d.onclick=()=>d.remove();

/* ---- 患者结果二维码 ---- */
const PATIENT_URL="https://fsclyx.github.io/yaoshi-gongzuotai/patient.html";
function b64url(s){ return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function unb64url(s){ s=s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4)s+="="; return decodeURIComponent(escape(atob(s))); }
function qrLink(code,initials,date,lit,amrs){
  const s=state.settings;
  const o={c:code,i:initials,d:date,L:lit.join(""),A:(amrs||[]).join(""),n:s.centerName||"",p:s.phone||""};
  return PATIENT_URL+"#1"+b64url(JSON.stringify(o));
}
function qrBoxHtml(link,label){
  let img="";
  try{ const qr=qrcode(0,"M"); qr.addData(link); qr.make(); img=qr.createImgTag(4,10); }
  catch(e){ return `<p class="muted">二维码生成失败：${esc(e.message)}</p>`; }
  return `<div class="qrbox">${img}
    <p style="margin-top:6px"><b>${label||"患者结果二维码"}</b></p>
    <p class="muted" style="max-width:420px;margin:4px auto">请患者用手机<b>拍下此二维码</b>，回家后用微信“扫一扫”扫描照片即可查看自己的评估结果和改进建议（需手机联网）。结果页不含姓名等身份信息。</p></div>`;
}

function enrNext(){
  if(enr.step===0){ // 知情同意
    enr.consent.date = document.getElementById("c_date")?.value || enr.consent.date;
    if(!enr.consent.date){ alert("请填写知情同意签署日期"); return; }
    if(enr.consent.mode==="electronic" && !sigValid(enr.consent.sig)){
      alert("请患者在签字板上签名；如现场已签纸质版，请改选“已签署纸质版”。"); return;
    }
  }
  if(enr.step===1){ // 基本信息
    collectInfo();
    const i=enr.info, errs=[];
    if(!/^\d{4,8}$/.test(i.code)) errs.push("受试者编号应为数字（中心号+顺序号）");
    if(state.patients.some(p=>p.code===i.code)) errs.push("该编号已存在");
    if(!/^[A-Z]{2,4}$/.test(i.initials)) errs.push("姓名缩写应为2~4位大写字母");
    if(!i.enrollDate) errs.push("请填入组日期");
    if(!i.sex) errs.push("请选择性别");
    if(!(i.age>=60)) errs.push("年龄须≥60岁");
    if(!i.diseases.some(d=>["高血压","糖尿病","冠心病","脑卒中"].includes(d))) errs.push("四种目标慢性病须至少选1种");
    if(errs.length){ alert("请核查：\n· "+errs.join("\n· ")); return; }
  }
  if(enr.step===2){ // 用药清单
    enr.info.notes = document.getElementById("f_notes")?.value?.trim()||"";
    enr.info.drugCount = +document.getElementById("f_drug")?.value||0;
    enr.meds = enr.meds.filter(m=>m.name.trim()||m.dose.trim()||m.freq.trim()||m.note.trim());
    const bad = enr.meds.findIndex(m=>!(m.name.trim()&&m.dose.trim()&&m.freq.trim()));
    if(bad>=0){ alert("第"+(bad+1)+"行药品的药名、剂量、频次为必填项，请补全或删除该行。"); return; }
    const n=enr.meds.length;
    if(n>0 && enr.info.drugCount<n) enr.info.drugCount=n;
    if(!(enr.info.drugCount>=2)){ alert("服用药物须≥2种（不符合入组标准），请核对用药清单。"); return; }
    if(enr.meds.length===0) enr.meds=[{name:"",dose:"",freq:"",note:""}]; // 回退编辑时保留空行
  }
  if(enr.step===3 || enr.step===4){ // 量表完整性
    const key = enr.step===3?"amrs":"lit";
    const arr = enr[key];
    let firstMiss=-1;
    arr.forEach((v,idx)=>{ if(v===null){ if(firstMiss<0)firstMiss=idx; document.getElementById(key+"_r"+idx)?.classList.add("missing"); }});
    if(firstMiss>=0){ toast("尚有未回答的条目（已用红框标出）"); document.getElementById(key+"_r"+firstMiss)?.scrollIntoView({behavior:"smooth",block:"center"}); return; }

  enr.step++; renderEnroll();
}

function fuIv(i,on){ if(on){ if(!fuTmp.iv.includes(i))fuTmp.iv.push(i);} else fuTmp.iv=fuTmp.iv.filter(x=>x!==i); }
function fuSave(pid,which){
  const p = state.patients.find(x=>x.id===pid); if(!p) return;
  const g=id=>document.getElementById(id)?.value?.trim()||"";
  const fu = {done:true, date:g("u_date"), method:g("u_method"),
    adr:fuTmp.adr, adrDesc:g("u_adrdesc"), monitor:g("u_monitor"),
    iv:fuTmp.iv.slice().sort(), ivNote:g("u_ivnote")};
  if(!fu.date){ alert("请填写随访日期"); return; }
  if(fuTmp.adr==="有" && !fu.adrDesc){ alert("已选“有不良反应”，请填写描述"); return; }
  if(which===1){
    fu.newIssue=fuTmp.newIssue; fu.newDesc=g("u_nidesc");
  } else {
    // 复测必须完整
    if(fuTmp.amrs.some(v=>v===null) || fuTmp.lit.some(v=>v===null)){
      let k = fuTmp.amrs.some(v=>v===null)?"amrs":"lit";
      fuTmp[k].forEach((v,idx)=>{ if(v===null) document.getElementById(k+"_r"+idx)?.classList.add("missing"); });
      toast("复测量表尚有未回答条目（红框标出）"); return;
    }
    const r = scoreLit(fuTmp.lit);
    Object.assign(fu, {uv:fuTmp.uv, uvType:g("u_uvtype"), uvReason:g("u_uvreason"), uvAdj:g("u_uvadj"), uvCost:g("u_uvcost"),
      drugCount:g("u_drug"), amrs:fuTmp.amrs.slice(), amrsScore:scoreAmrs(fuTmp.amrs),
      lit:fuTmp.lit.slice(), total:r.total, avg:r.avg, level:r.level, pass:r.pass, dims:r.dims,
      sat1:g("u_s1"), sat2:g("u_s2"), sat3:g("u_s3"), finish:g("u_finish")});
    fu.newIssue="—";
  }
  if(which===1) p.fu1=fu; else p.fu2=fu;
  save(); fuTmp=null;
  toast(`第${fuMonth(which)}个月随访已保存`);
  go("detail",pid);
}

/* ---------------- 云端加密备份（GitHub 私有仓库，端到端加密） ---------------- */
const CLOUD_KEY="ysgzt_cloud_v1";
let cloud={repo:"",token:"",pass:"",auto:false,lastUp:"",lastMsg:""};
function loadCloud(){ try{const r=localStorage.getItem(CLOUD_KEY); if(r) cloud=Object.assign(cloud,JSON.parse(r));}catch(e){} }
function saveCloud(){ try{localStorage.setItem(CLOUD_KEY,JSON.stringify(cloud));}catch(e){} }
function b64(bytes){let s="";const CH=0x8000;for(let i=0;i<bytes.length;i+=CH){s+=String.fromCharCode.apply(null,bytes.subarray(i,i+CH));}return btoa(s);}
function unb64(str){const bin=atob(str);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
async function deriveKey(pass,salt){const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]);
 return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:150000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);}
async function encState(pass){const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));
 const key=await deriveKey(pass,salt);
 const ct=new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM",iv:iv},key,new TextEncoder().encode(JSON.stringify(state))));
 const out=new Uint8Array(28+ct.length);out.set(salt,0);out.set(iv,16);out.set(ct,28);return b64(out);}
async function decState(pass,b){const u=unb64(b);const key=await deriveKey(pass,u.slice(0,16));
 const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:u.slice(16,28)},key,u.slice(28));
 return JSON.parse(new TextDecoder().decode(pt));}
function cloudPath(){return "backups/center-"+(state.settings.centerNo||"00")+".json.enc";}
function cloudApiUrl(){return "https://gitee.com/api/v5/repos/"+cloud.repo+"/contents/"+cloudPath();}
async function giteeGet(){
 let r=await fetch(cloudApiUrl(),{headers:{"Authorization":"token "+cloud.token}});
 if(r.status===401){ r=await fetch(cloudApiUrl()+"?access_token="+encodeURIComponent(cloud.token)); }
 return r;
}
let cloudTimer=null, cloudBusy=false;
function scheduleCloud(){ if(!cloud.auto||!cloud.repo||!cloud.token||!cloud.pass) return;
 clearTimeout(cloudTimer); cloudTimer=setTimeout(function(){cloudUpload(false);},15000);}
async function cloudUpload(manual){
 if(cloudBusy) return;
 if(!cloud.repo||!cloud.token||!cloud.pass){ if(manual)alert("请先在设置中完整填写：数据仓库、访问令牌、加密口令");return;}
 if(!/^\S+\/\S+$/.test(cloud.repo)){ if(manual)alert("仓库格式应为：用户名/仓库名");return;}
 cloudBusy=true; setCloudMsg("上传中…");
 try{
   let sha=null;
   const g=await giteeGet();
   if(g.status===200){ const gj=await g.json(); if(gj&&gj.sha) sha=gj.sha; }
   else if(g.status===401||g.status===403){ throw new Error("令牌无效或无权限("+g.status+")"); }
   else if(g.status!==404){ throw new Error("检查云端文件失败("+g.status+")"); }
   const content=await encState(cloud.pass);
   const body={access_token:cloud.token, message:"encrypted auto-backup "+new Date().toLocaleString("zh-CN"), content:content};
   if(sha) body.sha=sha;
   const r=await fetch(cloudApiUrl(),{method:sha?"PUT":"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
   if(!r.ok) throw new Error("上传失败("+r.status+")");
   cloud.lastUp=new Date().toLocaleString("zh-CN"); cloud.lastMsg="成功"; saveCloud();
   setCloudMsg("最近上传："+cloud.lastUp+"（成功，已加密）"); if(manual)toast("云端加密备份成功");
 }catch(e){
   cloud.lastMsg="失败："+e.message; saveCloud();
   setCloudMsg("上传失败："+e.message+"。数据仍安全保存在本机，将随下次保存自动重试。");
   if(manual)alert("云端备份失败："+e.message);
 }finally{ cloudBusy=false; }
}
async function cloudRestore(){
 if(!cloud.repo||!cloud.token||!cloud.pass){alert("请先完整填写云端配置");return;}
 if(!confirm("将用云端备份覆盖本机当前数据（本机现有 "+state.patients.length+" 名患者），确认？"))return;
 try{

   const obj=await decState(cloud.pass, String(j.content||"").replace(/\n/g,""));

/* ---------------- 自测（控制台调用 __selftest()） ---------------- */
window.__selftest = function(){
  const out=[];
  const firsts = LIT_ITEMS.map(it=>it[2][0][1]);   // 全选第一列
  const best   = LIT_ITEMS.map(it=>Math.max(...it[2].map(o=>o[1]))); // 每题选最优答案
  const r1=scoreLit(firsts), r2=scoreLit(best);
  out.push(["全选第一列 total=85?", r1.total===85, r1]);
  out.push(["全选第一列 分层=不足?", r1.level==="low"]);
  out.push(["全选最优 total=205 avg=5 良好?", r2.total===205&&r2.avg===5&&r2.level==="good"]);
  const bestBeh = LIT_ITEMS.map(it=> Math.max(...it[2].map(o=>o[1])) ); // 每题最高分
  out.push(["每题最高分求和=205?", bestBeh.reduce((a,b)=>a+b,0)===205]);
  const a1 = AMRS_ITEMS.map(it=>it[2][0][1]);
  out.push(["AMRS全选第一列=15?（11×1+反向4）", scoreAmrs(a1)===15]);
  const dimCount = Object.values(DIMS).reduce((a,b)=>a+b.length,0);
  out.push(["9维度覆盖41题?", dimCount===41]);
  const allItems = Object.values(DIMS).flat().sort((a,b)=>a-b);
  out.push(["维度题号无重复且1-41?", allItems.join()===[...Array(41)].map((_,i)=>i+1).join()]);
  out.push(["边界: avg=4 → 良好?", levelOf(4)==="good"]);
  out.push(["边界: avg=3 → 不足?", levelOf(3)==="low"]);
  out.push(["边界: avg=3.5 → 中等?", levelOf(3.5)==="mid"]);
  out.push(["条目建议: 41条文案齐全?", ITEM_TIPS.length===41 && ITEM_TIPS.every(t=>t.length>4)]);
  out.push(["条目分级: 1,2→强力 3,4→普通 5→不干预?",
    adviceLevel(1)===0&&adviceLevel(2)===0&&adviceLevel(3)===1&&adviceLevel(4)===1&&adviceLevel(5)===2]);
  const qo={c:"01001",i:"ZHSA",d:"2026-07-14",L:"5".repeat(41),A:"1".repeat(12),n:"测试中心",p:"010-1234"};
  const rt=JSON.parse(unb64url(b64url(JSON.stringify(qo))));
  out.push(["QR载荷编解码往返一致?", JSON.stringify(rt)===JSON.stringify(qo)]);
  out.push(["QR链接生成非空?", qrLink("01001","ZHSA","2026-07-14",Array(41).fill(4),Array(12).fill(2)).startsWith(PATIENT_URL+"#1")]);
  out.push(["meds兼容: 旧数据无meds不报错?", medsStr({})==="" ]);
  out.push(["AMRS提示: 12条齐全?", AMRS_TIPS.length===12]);
  console.table(out.map(o=>({检查:o[0],通过:o[1]})));
  return out.every(o=>o[1]);
};
